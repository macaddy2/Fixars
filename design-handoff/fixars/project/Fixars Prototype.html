<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Fixars · Super-app prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy-900:#0A1628; --navy-800:#111E33; --navy-700:#1B2B44; --navy-600:#2A3C56; --navy-500:#3E5271;
  --blue-600:#1E5BFF; --blue-500:#3B82F6; --blue-400:#5B9DFF; --blue-100:#DBE7FF; --blue-50:#EEF3FF;
  --ink-900:#0A1628; --ink-700:#2A3C56; --ink-500:#5A6B85; --ink-400:#8695AE;
  --ink-300:#B4BECF; --ink-200:#D7DDE8; --ink-100:#EBEFF5; --ink-50:#F5F7FB;
  --paper:#FFFFFF; --canvas:#F9FAFC;
  --success:#16A34A; --success-bg:#DCFCE7;
  --warning:#D97706; --warning-bg:#FEF3C7;
  --danger:#C24A3E;  --danger-bg:#FBE8E5;
  --concept:#7C3AED; --concept-bg:#F1EAFE;
  --invest:#10B981;  --invest-bg:#E6F8F1;
  --collab:#E87D4A;  --collab-bg:#FCEEE4;
  --skills:#06B6D4;  --skills-bg:#E0F6FA;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-2xl:28px; --r-full:999px;
  --shadow-sm:0 1px 2px rgba(10,22,40,.04);
  --shadow-md:0 4px 12px rgba(10,22,40,.06),0 1px 2px rgba(10,22,40,.04);
  --shadow-lg:0 12px 32px rgba(10,22,40,.08),0 2px 6px rgba(10,22,40,.04);
}
*,*::before,*::after{box-sizing:border-box}
html{background:var(--canvas);transition:background .25s}
body{margin:0;padding:0;background:var(--canvas);color:var(--ink-900);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}

/* ===== TWEAK: theme (dark) ===== */
html[data-theme="dark"],
body[data-theme="dark"]{
  --canvas:#0A1628; --paper:#111E33;
  --ink-900:#F4F7FB; --ink-700:#D7DDE8; --ink-500:#8695AE; --ink-400:#5A6B85;
  --ink-300:#3E5271; --ink-200:#1B2B44; --ink-100:#1B2B44; --ink-50:#162338;
  --navy-900:#0A1628;
  --blue-50:rgba(30,91,255,.12); --concept-bg:rgba(124,58,237,.16);
  --invest-bg:rgba(16,185,129,.16); --collab-bg:rgba(232,125,74,.16); --skills-bg:rgba(6,182,212,.16);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 4px 12px rgba(0,0,0,.35);
  --shadow-lg:0 12px 32px rgba(0,0,0,.45);
}
body[data-theme="dark"] .topbar{background:rgba(17,30,51,.85)}
body[data-theme="dark"] .btn-ghost{background:#162338;color:var(--ink-900);border-color:#2A3C56}
body[data-theme="dark"] .modal-mask{background:rgba(0,0,0,.65)}

/* ===== TWEAK: theme (dim/sepia) ===== */
html[data-theme="dim"],
body[data-theme="dim"]{
  --canvas:#F5EFE4; --paper:#FBF6EC;
  --ink-900:#2A1F12; --ink-700:#5A4632; --ink-500:#8E7758; --ink-400:#B59E7E;
  --ink-200:#E5D9C2; --ink-100:#EDE2CD; --ink-50:#F2E9D6;
  --blue-600:#7C5A2E; --blue-500:#9C7440; --blue-50:#F0E5D1;
}

/* ===== TWEAK: density ===== */
body[data-density="compact"]{
  --pad-card:14px; --pad-tile:14px; --gap-grid:10px; --type-scale:.92;
}
body[data-density="cozy"]{ --pad-card:20px; --pad-tile:20px; --gap-grid:14px; --type-scale:1; }
body[data-density="spacious"]{ --pad-card:30px; --pad-tile:28px; --gap-grid:22px; --type-scale:1.08; }
body[data-density] .card{padding:var(--pad-card,20px)}
body[data-density] .stat{padding:var(--pad-card,18px)}
body[data-density] .subapp-tile{padding:var(--pad-tile,20px)}
body[data-density] .list-card{padding:var(--pad-card,18px)}
body[data-density] .stats{gap:var(--gap-grid,14px)}
body[data-density] .list-grid{gap:var(--gap-grid,14px)}
body[data-density] .subapp-grid{gap:var(--gap-grid,16px)}
body[data-density] .display{font-size:calc(1em * var(--type-scale,1))}

/* ===== TWEAK: vibe ===== */
/* Focused — flat, muted, no glass */
body[data-vibe="focused"]{
  --shadow-sm:none; --shadow-md:0 1px 0 var(--ink-100); --shadow-lg:0 1px 0 var(--ink-100);
}
body[data-vibe="focused"] .topbar{backdrop-filter:none;-webkit-backdrop-filter:none;background:var(--paper)}
body[data-vibe="focused"] .card,body[data-vibe="focused"] .stat,body[data-vibe="focused"] .subapp-tile,body[data-vibe="focused"] .list-card,body[data-vibe="focused"] .feed-card,body[data-vibe="focused"] .composer{box-shadow:none;border-radius:8px}
body[data-vibe="focused"] *{transition-duration:0s !important}

/* Expressive — current default, with extras */
body[data-vibe="expressive"] .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue-600),var(--concept))}
body[data-vibe="expressive"] .stat{position:relative;overflow:hidden}

/* Playful — bold colors, big radii, gradients, motion */
body[data-vibe="playful"]{
  --r-sm:10px; --r-md:14px; --r-lg:22px; --r-xl:28px; --r-2xl:36px;
  --shadow-md:0 8px 24px rgba(124,58,237,.12),0 2px 6px rgba(30,91,255,.08);
  --shadow-lg:0 20px 48px rgba(124,58,237,.18),0 4px 12px rgba(30,91,255,.1);
}
body[data-vibe="playful"] .card,body[data-vibe="playful"] .stat,body[data-vibe="playful"] .subapp-tile,body[data-vibe="playful"] .list-card,body[data-vibe="playful"] .feed-card{border-radius:var(--r-lg)}
body[data-vibe="playful"] .subapp-tile:hover{transform:translateY(-4px) rotate(-.4deg)}
body[data-vibe="playful"] .btn-primary{background:linear-gradient(135deg,var(--blue-600),var(--concept));box-shadow:0 6px 16px rgba(124,58,237,.28)}
body[data-vibe="playful"] .stat .v{background:linear-gradient(135deg,var(--blue-600),var(--concept));-webkit-background-clip:text;background-clip:text;color:transparent}
body[data-vibe="playful"] .nav-item.active{background:linear-gradient(135deg,rgba(30,91,255,.2),rgba(124,58,237,.2))}
body[data-vibe="playful"] .topbar{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.78))}
body[data-vibe="playful"] .avatar{box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--blue-600)}

/* ===== Tweaks panel ===== */
.tw-panel{position:fixed;bottom:24px;right:24px;width:300px;background:var(--paper);border:1px solid var(--ink-200);border-radius:18px;box-shadow:0 24px 48px rgba(10,22,40,.18);padding:18px;z-index:100;font-family:'Inter',sans-serif;display:none}
.tw-panel.open{display:block}
.tw-panel h4{margin:0 0 4px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:-0.01em;display:flex;justify-content:space-between;align-items:center}
.tw-panel .lede{font-size:11px;color:var(--ink-500);margin-bottom:14px}
.tw-panel .group{margin-bottom:14px}
.tw-panel .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-bottom:6px}
.tw-seg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:var(--ink-50);padding:3px;border-radius:10px}
.tw-seg button{padding:7px 6px;font-size:11px;font-weight:600;color:var(--ink-500);border-radius:7px;cursor:pointer;border:none;background:transparent;font-family:inherit}
.tw-seg button.on{background:var(--paper);color:var(--navy-900);box-shadow:0 1px 2px rgba(0,0,0,.06)}
body[data-theme="dark"] .tw-seg button.on{background:#1B2B44;color:#fff}
.tw-close{cursor:pointer;color:var(--ink-400);font-size:18px;line-height:1;background:none;border:none;padding:0}
.tw-toggle-fab{position:fixed;bottom:24px;right:24px;width:46px;height:46px;border-radius:50%;background:var(--navy-900);color:white;display:none;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(10,22,40,.3);z-index:99;cursor:pointer;border:none}
.tw-toggle-fab.show{display:flex}
.tw-toggle-fab svg{width:20px;height:20px}
body{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}
.mono{font-family:'JetBrains Mono',monospace}

/* ===== Shell ===== */
.shell{display:grid;grid-template-columns:64px 1fr;min-height:100vh;transition:grid-template-columns .22s ease}
.shell:has(.sidebar:hover){grid-template-columns:240px 1fr}
.sidebar{background:var(--navy-900);color:white;padding:20px 12px;position:sticky;top:0;height:100vh;overflow:hidden;display:flex;flex-direction:column;gap:4px;width:240px;transition:width .22s ease}
.shell:not(:has(.sidebar:hover)) .sidebar{width:64px}
.shell:not(:has(.sidebar:hover)) .sidebar .brand-name,
.shell:not(:has(.sidebar:hover)) .sidebar .nav-section,
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item .lbl,
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item .badge,
.shell:not(:has(.sidebar:hover)) .sidebar-footer .name,
.shell:not(:has(.sidebar:hover)) .sidebar-footer .sub{opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .12s}
.shell:has(.sidebar:hover) .sidebar .brand-name,
.shell:has(.sidebar:hover) .sidebar .nav-section,
.shell:has(.sidebar:hover) .sidebar .nav-item .lbl,
.shell:has(.sidebar:hover) .sidebar .nav-item .badge,
.shell:has(.sidebar:hover) .sidebar-footer .name,
.shell:has(.sidebar:hover) .sidebar-footer .sub{opacity:1;transition:opacity .15s .08s}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item{justify-content:center;padding:11px 0}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-section{height:0;padding:6px 0;overflow:hidden;margin:0}
.shell:not(:has(.sidebar:hover)) .sidebar .brand{justify-content:center;padding:6px 0 16px}
.shell:not(:has(.sidebar:hover)) .sidebar-footer{justify-content:center}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.brand img{height:28px;width:auto;flex-shrink:0}
.brand-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;letter-spacing:-0.02em}
.nav-section{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:14px 8px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.72);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:white}
.nav-item.active{background:rgba(255,255,255,.1);color:white;border-color:rgba(255,255,255,.08)}
.nav-item .ic{width:20px;height:20px;flex-shrink:0;stroke:currentColor}
.nav-item.app-concept{color:rgba(196,181,253,.85)}
.nav-item.app-concept:hover,.nav-item.app-concept.active{color:#DDD6FE}
.nav-item.app-invest{color:rgba(110,231,183,.85)}
.nav-item.app-invest:hover,.nav-item.app-invest.active{color:#A7F3D0}
.nav-item.app-collab{color:rgba(253,186,116,.85)}
.nav-item.app-collab:hover,.nav-item.app-collab.active{color:#FED7AA}
.nav-item.app-skills{color:rgba(103,232,249,.85)}
.nav-item.app-skills:hover,.nav-item.app-skills.active{color:#A5F3FC}
.nav-item .badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--blue-600);color:white}
/* Active rail accent on collapsed */
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:white}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item.app-concept.active::before{background:var(--concept)}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item.app-invest.active::before{background:var(--invest)}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item.app-collab.active::before{background:var(--collab)}
.shell:not(:has(.sidebar:hover)) .sidebar .nav-item.app-skills.active::before{background:var(--skills)}

.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue-600),var(--concept));color:white;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.sidebar-footer .name{font-size:13px;font-weight:500}
.sidebar-footer .sub{font-size:11px;color:rgba(255,255,255,.5)}

/* ===== Main ===== */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--ink-100);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
.search{flex:1;max-width:480px;background:var(--ink-50);border:1px solid var(--ink-100);border-radius:10px;padding:9px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-500)}
.search .kbd{margin-left:auto;background:var(--paper);border:1px solid var(--ink-200);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-500)}
.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-500);transition:all .15s;position:relative}
.icon-btn:hover{background:var(--ink-50);color:var(--ink-900)}
.icon-btn .dot-notif{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid white}
.points-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--warning-bg);color:var(--warning);font-size:12px;font-weight:600}

.content{padding:32px;max-width:1400px;width:100%;margin:0 auto;flex:1}

/* ===== Page heading ===== */
.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.page-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.page-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px}
.page-icon.concept{background:var(--concept)}
.page-icon.invest{background:var(--invest)}
.page-icon.collab{background:var(--collab)}
.page-icon.skills{background:var(--skills)}
.page-icon.fixars{background:var(--navy-900)}
.page-tag{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-400);font-weight:600}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:500;letter-spacing:-0.025em;line-height:1.1;margin:0}
.page-sub{color:var(--ink-500);font-size:15px;margin:6px 0 0;max-width:560px;line-height:1.5}

.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(--blue-600);color:white}
.btn-primary:hover{background:#1745CC}
.btn-ghost{background:var(--paper);color:var(--ink-900);border-color:var(--ink-200)}
.btn-ghost:hover{background:var(--ink-50);border-color:var(--ink-300)}
.btn-app-concept{background:var(--concept);color:white}
.btn-app-invest{background:var(--invest);color:white}
.btn-app-collab{background:var(--collab);color:white}
.btn-app-skills{background:var(--skills);color:white}
.btn-sm{padding:7px 12px;font-size:12px}

/* ===== Cards ===== */
.card{background:var(--paper);border:1px solid var(--ink-100);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)}
.card-dark{background:var(--navy-900);color:white;border:none}

/* Stat strip */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--paper);border:1px solid var(--ink-100);border-radius:var(--r-lg);padding:18px}
.stat .k{font-size:11px;color:var(--ink-400);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:8px}
.stat .v{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:500;letter-spacing:-0.02em}
.stat .t{font-size:11px;margin-top:4px}
.stat .t.up{color:var(--success)}
.stat .t.down{color:var(--danger)}

/* Search + filter row */
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar-search{flex:1;min-width:240px;background:var(--paper);border:1px solid var(--ink-200);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.toolbar-search input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;background:transparent;color:var(--ink-900)}
.toolbar-search input::placeholder{color:var(--ink-400)}
.segment{display:inline-flex;background:var(--ink-50);padding:3px;border-radius:10px;border:1px solid var(--ink-100)}
.segment button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink-500)}
.segment button.active{background:var(--paper);color:var(--navy-900);box-shadow:var(--shadow-sm)}

/* Sub-app grid */
.subapp-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.subapp-tile{background:var(--paper);border:1px solid var(--ink-100);border-radius:var(--r-lg);padding:20px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:14px;min-height:160px;position:relative;overflow:hidden}
.subapp-tile:hover{border-color:var(--ink-300);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.subapp-tile .acc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.subapp-tile.concept .acc-bar{background:var(--concept)}
.subapp-tile.invest .acc-bar{background:var(--invest)}
.subapp-tile.collab .acc-bar{background:var(--collab)}
.subapp-tile.skills .acc-bar{background:var(--skills)}
.subapp-tile .head{display:flex;align-items:center;gap:10px}
.subapp-tile .head .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px}
.subapp-tile.concept .icon{background:var(--concept)}
.subapp-tile.invest .icon{background:var(--invest)}
.subapp-tile.collab .icon{background:var(--collab)}
.subapp-tile.skills .icon{background:var(--skills)}
.subapp-tile .head .name{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:16px}
.subapp-tile .desc{font-size:12px;color:var(--ink-500);line-height:1.5}
.subapp-tile .foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.subapp-tile .meta-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-400)}
.subapp-tile .arrow{font-size:18px;color:var(--ink-300);transition:transform .15s}
.subapp-tile:hover .arrow{transform:translateX(4px);color:var(--ink-500)}

/* Wallet */
.wallet-card{background:linear-gradient(135deg,var(--navy-900),var(--navy-700));color:white;border-radius:var(--r-lg);padding:24px;position:relative;overflow:hidden}
.wallet-card::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(30,91,255,.25),transparent 70%)}
.wallet-card .k{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;position:relative;z-index:1}
.wallet-card .v{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:500;margin-top:6px;position:relative;z-index:1}
.wallet-card .delta{font-size:12px;color:#6EE7B7;margin-top:2px;position:relative;z-index:1}
.wallet-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px;position:relative;z-index:1}
.wallet-action{background:rgba(255,255,255,.1);color:white;padding:10px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:.15s}
.wallet-action:hover{background:rgba(255,255,255,.18)}
.wallet-action.primary{background:white;color:var(--navy-900)}

/* Activity list */
.activity-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--ink-100);align-items:flex-start}
.activity-row:last-child{border-bottom:none}
.activity-row .av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:600}
.activity-row .body{flex:1;min-width:0}

/* Detail panes */

/* Mobile bottom tabs */

.sa-card{padding:24px 22px;border-radius:24px;color:white;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform .3s;cursor:pointer;min-height:0}

.float-card{position:absolute;background:var(--paper);border:1px solid var(--ink-100);border-radius:14px;padding:11px 14px;box-shadow:0 16px 32px rgba(10,22,40,.12);display:flex;align-items:center;gap:10px;font-size:12px;animation:floatY 6s ease-in-out infinite;z-index:3;max-width:240px}

.splash-stats .v{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;letter-spacing:-0.025em}
.splash-stats .k{font-size:12px;color:var(--ink-500);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-top:2px}

.splash-visual{position:relative;height:560px}
.subapp-2x2{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;height:100%}
.sa-card{padding:28px 24px;border-radius:24px;color:white;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform .3s}
.sa-card:hover{transform:translateY(-6px) rotate(-.6deg)}
.sa-card::after{content:"";position:absolute;right:-30px;bottom:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.1)}
.sa-card.concept{background:linear-gradient(140deg,#7C3AED,#5B21B6);transform:rotate(-1.5deg)}
.sa-card.invest{background:linear-gradient(140deg,#10B981,#047857);transform:rotate(1.2deg)}
.sa-card.collab{background:linear-gradient(140deg,#F97B47,#C2410C);transform:rotate(1.5deg)}
.sa-card.skills{background:linear-gradient(140deg,#06B6D4,#0E7490);transform:rotate(-1.2deg)}
.sa-card .glyph{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.sa-card .nm{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-top:14px}
.sa-card .tg{font-size:12px;opacity:.85;margin-top:4px;line-height:1.4}
.sa-card .stat{position:relative;z-index:1;background:rgba(0,0,0,0);border:none;padding:0}
.sa-card .stat .v{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:white;letter-spacing:-0.02em}
.sa-card .stat .k{font-size:11px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-top:2px}

.float-card{position:absolute;background:var(--paper);border:1px solid var(--ink-100);border-radius:14px;padding:12px 14px;box-shadow:0 16px 32px rgba(10,22,40,.12);display:flex;align-items:center;gap:10px;font-size:12px;animation:float 6s ease-in-out infinite}
.float-card .ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;flex-shrink:0}
.float-card .t{font-weight:600;font-size:12px;color:var(--navy-900)}
.float-card .m{font-size:11px;color:var(--ink-500);margin-top:1px}
.float-card.fc1{top:-12px;right:-24px;animation-delay:0s}
.float-card.fc1 .ic{background:var(--invest)}
.float-card.fc2{bottom:60px;left:-32px;animation-delay:2s}
.float-card.fc2 .ic{background:var(--concept)}
.float-card.fc3{top:50%;right:-40px;animation-delay:4s}
.float-card.fc3 .ic{background:var(--collab)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Splash sections */
.splash-section{padding:80px 48px;max-width:1320px;margin:0 auto}
.splash-section.dark{max-width:none;background:var(--navy-900);color:white;padding:80px 48px}
.splash-section.dark .inner{max-width:1320px;margin:0 auto}
.splash-section h2{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:500;letter-spacing:-0.025em;line-height:1.1;margin:0 0 16px}
.splash-section .lede{font-size:16px;color:var(--ink-500);max-width:620px;line-height:1.55;margin-bottom:48px}
.splash-section.dark .lede{color:rgba(255,255,255,.65)}
.howit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.howit-step{background:var(--paper);border:1px solid var(--ink-100);border-radius:18px;padding:24px;position:relative}
.splash-section.dark .howit-step{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.howit-step .num{position:absolute;top:16px;right:18px;font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:600;line-height:1;color:var(--ink-100);letter-spacing:-0.03em}
.splash-section.dark .howit-step .num{color:rgba(255,255,255,.08)}
.howit-step .glyph{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin-bottom:18px}
.howit-step .glyph.concept{background:var(--concept)}
.howit-step .glyph.invest{background:var(--invest)}
.howit-step .glyph.collab{background:var(--collab)}
.howit-step .glyph.skills{background:var(--skills)}
.howit-step h4{margin:0 0 6px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:500;letter-spacing:-0.015em}
.howit-step p{margin:0;font-size:13px;color:var(--ink-500);line-height:1.5}
.splash-section.dark .howit-step p{color:rgba(255,255,255,.6)}

/* About prose */
.about-prose{font-size:15px;line-height:1.7;color:var(--ink-700);max-width:720px}
.about-prose a{font-weight:600;cursor:pointer}
.about-prose a.l-concept{color:var(--concept)}
.about-prose a.l-invest{color:var(--invest)}
.about-prose a.l-collab{color:var(--collab)}
.about-prose a.l-skills{color:var(--skills)}

/* Footer */
.splash-footer{background:var(--navy-900);color:white;padding:64px 48px 32px}
.footer-inner{max-width:1320px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:48px;margin-bottom:48px}
.footer-brand{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.footer-brand img{height:32px;filter:brightness(0) invert(1)}
.footer-brand .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-0.02em}
.footer-blurb{font-size:13px;color:rgba(255,255,255,.65);line-height:1.55;margin-bottom:18px;max-width:320px}
.footer-socials{display:flex;gap:10px}
.footer-socials a{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);cursor:pointer;transition:.15s}
.footer-socials a:hover{background:rgba(255,255,255,.12);color:white}
.footer-col h5{margin:0 0 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,.4);font-weight:600}
.footer-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px}
.footer-col a{font-size:13px;color:rgba(255,255,255,.7);cursor:pointer}
.footer-col a:hover{color:white}
.footer-bot{border-top:1px solid rgba(255,255,255,.08);padding-top:24px;display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.4)}

/* Analytics chart */
.chart-card{background:var(--paper);border:1px solid var(--ink-100);border-radius:var(--r-lg);padding:20px}
.chart-bars{display:flex;align-items:flex-end;gap:10px;height:160px;margin-top:14px}
.chart-bars .bar{flex:1;background:linear-gradient(to top,var(--blue-600),var(--blue-400));border-radius:6px 6px 0 0;position:relative;min-height:8px;transition:.2s}
.chart-bars .bar:hover{filter:brightness(1.1)}
.chart-bars .bar .lbl{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:10px;color:var(--ink-400);font-family:'JetBrains Mono',monospace}
.donut-row{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:center}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy-900);color:white;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transition:transform .25s;z-index:60;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty{padding:48px 24px;text-align:center;color:var(--ink-400)}
.empty svg{margin-bottom:14px;opacity:.5}
.empty h4{margin:0 0 6px;font-family:'Space Grotesk',sans-serif;font-weight:500;color:var(--navy-900);font-size:16px}
.empty p{margin:0 0 16px;font-size:13px}

/* Detail page */
.detail-hero{background:var(--paper);border:1px solid var(--ink-100);border-radius:var(--r-lg);padding:24px;margin-bottom:20px}
.score-circle{position:relative;width:120px;height:120px;margin:0 auto}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--ink-100);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-500)}
.kv .v{font-weight:600;font-family:'JetBrains Mono',monospace}

/* ===== Responsive ===== */
@media (max-width:1100px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .subapp-grid{grid-template-columns:repeat(2,1fr)}
  .split{grid-template-columns:1fr}
}
@media (max-width:820px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:none}
  .mobile-header{display:flex}
  .mobile-tabs{display:block}
  .content{padding:18px 18px calc(env(safe-area-inset-bottom,16px) + 88px)}
  .page-title{font-size:24px}
  .page-sub{font-size:13px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{padding:14px}
  .stat .v{font-size:22px}
  .list-grid{grid-template-columns:1fr;gap:12px}
  .subapp-grid{grid-template-columns:1fr}
  .toolbar{gap:8px}
  .segment button{padding:6px 10px;font-size:11px}
  .wallet-card .v{font-size:26px}
  .modal{border-radius:18px 18px 0 0;align-self:flex-end;max-height:88vh}
  .modal-mask{align-items:flex-end;padding:0}
}

.hidden{display:none !important}
</style>

</button>
<div class="tw-panel" id="tw-panel">
  <h4>Tweaks <button class="tw-close" id="tw-close" aria-label="Close">×</button></h4>
  <div class="lede">Reshape the feel of Fixars.</div>

  <div class="group">
    <div class="label">Theme</div>
    <div class="tw-seg" data-tweak="theme">
      <button data-val="light">Light</button>
      <button data-val="dim">Sepia</button>
      <button data-val="dark">Dark</button>
    </div>
  </div>

  <div class="group">
    <div class="label">Density</div>
    <div class="tw-seg" data-tweak="density">
      <button data-val="compact">Compact</button>
      <button data-val="cozy">Cozy</button>
      <button data-val="spacious">Spacious</button>
    </div>
  </div>

  <div class="group">
    <div class="label">Vibe</div>
    <div class="tw-seg" data-tweak="vibe">
      <button data-val="focused">Focused</button>
      <button data-val="expressive">Expressive</button>
      <button data-val="playful">Playful</button>
    </div>
  </div>
</div>

<script>
(function(){
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "density": "cozy",
    "vibe": "playful"
  }/*EDITMODE-END*/;
  const state = {...TWEAK_DEFAULTS};
  const panel = document.getElementById('tw-panel');
  const fab = document.getElementById('tw-fab');
  const closeBtn = document.getElementById('tw-close');

  function apply(){
    document.documentElement.dataset.theme = state.theme;
    document.body.dataset.theme = state.theme;
    document.body.dataset.density = state.density;
    document.body.dataset.vibe = state.vibe;
    document.querySelectorAll('.tw-seg').forEach(seg=>{
      const key = seg.dataset.tweak;
      seg.querySelectorAll('button').forEach(b=>{
        b.classList.toggle('on', b.dataset.val===state[key]);
      });
    });
  }

  document.querySelectorAll('.tw-seg').forEach(seg=>{
    seg.addEventListener('click', e=>{
      const btn = e.target.closest('button[data-val]');
      if(!btn) return;
      const key = seg.dataset.tweak;
      state[key] = btn.dataset.val;
      apply();
      try{
        window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:btn.dataset.val}},'*');
      }catch(e){}
    });
  });

  // Edit-mode protocol
  window.addEventListener('message', e=>{
    if(!e.data) return;
    if(e.data.type==='__activate_edit_mode'){
      panel.classList.add('open');
      fab.classList.remove('show');
    } else if(e.data.type==='__deactivate_edit_mode'){
      panel.classList.remove('open');
    }
  });
  closeBtn.addEventListener('click', ()=>{
    panel.classList.remove('open');
    fab.classList.add('show');
    try{ window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }catch(e){}
  });
  fab.addEventListener('click', ()=>{
    panel.classList.add('open');
    fab.classList.remove('show');
  });

  apply();
  try{ window.parent.postMessage({type:'__edit_mode_available'},'*'); }catch(e){}
})();
</script>

<script src="prototype-app.js"></script>
</body>
</html>
